apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-api-config
  namespace: yas
data:
  default.conf: |
    server {
      listen 80;
      server_name api.yas.local.com;

      # Kubernetes CoreDNS
      resolver kube-dns.kube-system.svc.cluster.local valid=10s;

      location /media {
        set $upstream "media.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /swagger-ui {
        set $upstream "swagger-ui.yas.svc.cluster.local:8080";
        proxy_pass http://$upstream;
      }
      location /product {
        set $upstream "product.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /customer {
        set $upstream "customer.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /cart {
        set $upstream "cart.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /rating {
        set $upstream "rating.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /order {
        set $upstream "order.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /location {
        set $upstream "location.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /inventory {
        set $upstream "inventory.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /tax {
        set $upstream "tax.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /promotion {
        set $upstream "promotion.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /search {
        set $upstream "search.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /payment {
        set $upstream "payment.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /webhook {
        set $upstream "webhook.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /sampledata {
        set $upstream "sampledata.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /recommendation {
        set $upstream "recommendation.yas.svc.cluster.local";
        proxy_pass http://$upstream;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: yas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: nginx-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: yas
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-api-gateway
  namespace: yas
spec:
  ingressClassName: nginx
  rules:
    - host: api.yas.local.com
      http:
        paths:
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /product
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /customer
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /cart
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /rating
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /order
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /location
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /inventory
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /tax
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /promotion
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /payment
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /sampledata
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /recommendation
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
